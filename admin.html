<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <h1>Dashboard</h1>

    <div class="form-card">
      <h3>Tambah Anime</h3>
      <input id="title" placeholder="Judul">
      <input id="desc" placeholder="Deskripsi">
      <input id="day" placeholder="Hari rilis">
      <input id="coverUrl" placeholder="URL Cover">
      <input type="file" id="coverFile">
      <button id="addAnime">Tambah</button>
    </div>

    <div class="form-card">
      <h3>Tambah Episode</h3>
      <input id="animeId" placeholder="Anime ID">
      <input id="episode" placeholder="Episode">
      <input id="link" placeholder="Download link">
      <button id="addEpisode">Tambah</button>
    </div>

    <div id="animeList"></div>

  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
