<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <style>
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      z-index: 999;
    }

    #app {
      display: none;
    }
  </style>
</head>

<body>

<div id="loading">Checking login...</div>

<div id="app" class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Dashboard</h1>

    <!-- FORM ANIME -->
    <div class="form-card">
      <h3>Tambah Anime</h3>
      <input id="title" placeholder="Judul Anime">
      <input id="desc" placeholder="Deskripsi">
      <input id="day" placeholder="Hari rilis">
      <input id="coverUrl" placeholder="URL Cover (optional)">
      <input type="file" id="coverFile">
      <button id="addAnime">Tambah Anime</button>
    </div>

    <!-- FORM EPISODE -->
    <div class="form-card">
      <h3>Tambah Episode</h3>
      <input id="animeId" placeholder="Anime ID">
      <input id="episode" placeholder="Episode ke">
      <input id="link" placeholder="Download link">
      <button id="addEpisode">Tambah Episode</button>
    </div>

    <!-- LIST -->
    <h2>Daftar Anime</h2>
    <div id="animeList"></div>

  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
