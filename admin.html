<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="display:flex">

  <!-- SIDEBAR -->
  <div style="width:200px; background:#020617; padding:20px;">
    <h2>Admin</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <h1>Dashboard</h1>

    <!-- ADD ANIME -->
    <div class="card">
      <h2>Tambah Anime</h2>

      <input id="title" placeholder="Judul">
      <input id="desc" placeholder="Deskripsi">
      <input id="day" placeholder="Hari rilis">

      <input id="coverUrl" placeholder="URL Cover (optional)">
      <input type="file" id="coverFile">

      <button id="addAnime">Tambah</button>
    </div>

    <!-- ADD EPISODE -->
    <div class="card">
      <h2>Tambah Episode</h2>

      <input id="animeId" placeholder="Anime ID">
      <input id="episode" placeholder="Episode">
      <input id="link" placeholder="Download link">

      <button id="addEpisode">Tambah</button>
    </div>

    <!-- LIST -->
    <div id="animeList"></div>

  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
