<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <div id="episodes"></div>
</div>

<script type="module">
import { supabase } from './supabase.js'

const id = new URLSearchParams(location.search).get('id')

const { data: anime } = await supabase
  .from('anime')
  .select('*')
  .eq('id', id)
  .single()

document.getElementById('title').innerText = anime.title
document.getElementById('desc').innerText = anime.description

const { data: eps } = await supabase
  .from('episodes')
  .select('*')
  .eq('anime_id', id)

eps.forEach(ep => {
  const el = document.createElement('div')
  el.innerHTML = `Episode ${ep.episode_number} - <a href="${ep.download_link}">Download</a>`
  document.getElementById('episodes').appendChild(el)
})
</script>
</body>
</html>
