<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 id="title"></h1>
  <p id="desc"></p>

  <h3>Episode</h3>
  <div id="episodes"></div>
</div>

<script type="module">
import { supabase } from './supabase.js'

const params = new URLSearchParams(location.search)
const id = params.get('id')

// GET ANIME
const { data: anime } = await supabase
  .from('anime')
  .select('*')
  .eq('id', id)
  .single()

document.getElementById('title').innerText = anime.title
document.getElementById('desc').innerText = anime.description

// GET EPISODES
const { data: eps } = await supabase
  .from('episodes')
  .select('*')
  .eq('anime_id', id)

const epDiv = document.getElementById('episodes')

eps.forEach(ep => {
  const el = document.createElement('div')

  el.innerHTML = `
    Episode ${ep.episode_number} -
    <a href="${ep.download_link}" target="_blank">Download</a>
  `

  epDiv.appendChild(el)
})
</script>

</body>
</html>
